<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Geo Empire – Immobilier</title>
  <link rel="stylesheet" href="immobilier.css">
</head>

<body>
  <header class="topbar">
    <a href="index.html" class="back">← Retour</a>
    <h1>Immobilier</h1>
  </header>

  <main class="container">

    <!-- VENTE -->
    <section class="panel">
      <h2>Vente</h2>

      <label>Quantité :</label>
      <input id="vente-quantite" type="number" placeholder="Quantité à vendre">

      <label>Molette : <span id="vente-molette-val">0%</span></label>
      <input id="vente-molette" type="range" min="-20" max="20" value="0">

      <p>Prix de base : <span id="vente-prix-base">0</span> €</p>
      <p>Prix final : <span id="vente-prix-final">0</span> €</p>

      <button id="btn-vendre">Vendre</button>

      <div id="vente-resultat" class="result"></div>
    </section>

    <!-- LOCATION -->
    <section class="panel">
      <h2>Location automatique</h2>

      <label>Quantité :</label>
      <input id="loc-quantite" type="number" placeholder="Quantité à louer">

      <label>Molette : <span id="loc-molette-val">0%</span></label>
      <input id="loc-molette" type="range" min="-20" max="20" value="0">

      <p>Prix de base : <span id="loc-prix-base">0</span> €</p>
      <p>Prix final : <span id="loc-prix-final">0</span> €</p>

      <button id="btn-louer">Louer automatiquement</button>

      <div id="loc-resultat" class="result"></div>
    </section>

    <!-- HISTORIQUE -->
    <section class="panel">
      <h2>Historique</h2>
      <div id="historique" class="historique"></div>
    </section>

  </main>

  <script type="module" src="immobilier.js"></script>
</body>
</html>
